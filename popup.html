<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  --color-danger: #e85555;
  --color-warning: #d7aa57;
  --color-success: #62b665;
  --color-other: #777777;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 360px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  color: #333;
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  max-height: 500px;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  flex-shrink: 0;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  color: #4a6fa5;
}

.version-link {
  font-size: 11px;
  font-weight: 400;
  color: #888;
  margin-left: 6px;
  text-decoration: none;
}
.version-link:hover {
  color: #4a6fa5;
  text-decoration: underline;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.cache-info {
  font-size: 11px;
  color: #999;
}

.refresh-btn {
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}

.refresh-btn:hover { background: rgba(0,0,0,0.08); }
.refresh-btn:disabled { opacity: 0.4; cursor: default; }
.refresh-btn.spinning { animation: popup-spin 0.8s linear infinite; }

@keyframes popup-spin {
  to { transform: rotate(360deg); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  white-space: nowrap;
  z-index: 10;
  animation: toast-fade 3s ease forwards;
}

@keyframes toast-fade {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}

/* Footer */
.footer {
  flex-shrink: 0;
  padding: 8px 12px;
  background: #fff;
  border-top: 1px solid #e0e0e0;
  text-align: center;
}

.footer a {
  color: #4a6fa5;
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
}

.footer a:hover { text-decoration: underline; }

/* TOTP Settings */
.totp-section {
  flex-shrink: 0;
  padding: 8px 12px;
  background: #fff;
  border-top: 1px solid #e0e0e0;
}

.totp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.totp-title {
  font-size: 11px;
  font-weight: 600;
  color: #666;
}

.totp-toggle {
  font-size: 9px;
  color: #999;
  transition: transform 0.2s;
}

.totp-toggle.expanded { transform: rotate(180deg); }

.totp-body { display: none; margin-top: 6px; }
.totp-body.visible { display: block; }

.totp-status {
  font-size: 11px;
  color: #62b665;
  font-weight: 600;
  margin-bottom: 4px;
}

.totp-input-row {
  display: flex;
  gap: 4px;
  align-items: center;
}

.totp-input {
  flex: 1;
  font-size: 11px;
  padding: 4px 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-family: monospace;
}

.totp-btn {
  font-size: 11px;
  padding: 4px 8px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
}

.totp-btn-save {
  background: #4a6fa5;
  color: #fff;
}

.totp-btn-save:hover { background: #3a5f95; }
.totp-btn-save:disabled { opacity: 0.4; cursor: default; }

.totp-btn-qr {
  background: #f0f0f0;
  color: #333;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.totp-btn-qr:hover { background: #e0e0e0; }
.totp-btn-qr:disabled { opacity: 0.4; cursor: default; }

.totp-btn-qr svg {
  width: 12px;
  height: 12px;
  fill: currentColor;
}

.totp-btn-delete {
  background: #e85555;
  color: #fff;
}

.totp-btn-delete:hover { background: #d04040; }

.totp-configured-actions {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.totp-btn-show {
  background: #f0f0f0;
  color: #333;
}

.totp-btn-show:hover { background: #e0e0e0; }

.totp-debug {
  margin: 6px 0;
  padding: 6px 8px;
  background: #f8f8f8;
  border: 1px solid #e8e8e8;
  border-radius: 4px;
}

.totp-debug-code {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.totp-debug-code span:first-child {
  font-family: monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #333;
}

.totp-debug-countdown {
  font-size: 10px;
  color: #999;
}

.totp-debug-secret {
  margin-top: 4px;
  font-family: monospace;
  font-size: 9px;
  color: #999;
  word-break: break-all;
  user-select: all;
}

.totp-btn-qrgen {
  background: #f0f0f0;
  color: #333;
  font-weight: 600;
}

.totp-btn-qrgen:hover { background: #e0e0e0; }

.totp-qr-display {
  margin: 6px 0;
  padding: 8px;
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 4px;
  text-align: center;
}

.totp-qr-display img,
.totp-qr-display svg {
  max-width: 180px;
  height: auto;
  image-rendering: pixelated;
}

.totp-desc {
  font-size: 10px;
  color: #999;
  margin-top: 4px;
  line-height: 1.4;
}

.totp-security-note {
  font-size: 10px;
  color: #888;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid #eee;
  line-height: 1.4;
}

/* TOTP passphrase */
.totp-pp {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #eee;
}
.totp-pp-status {
  font-size: 10px;
  color: #888;
  margin-bottom: 6px;
  line-height: 1.4;
}
.totp-pp-setrow { flex-wrap: wrap; gap: 6px; }
.totp-autolock-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 11px;
  color: #666;
}
.totp-autolock-row select {
  font-size: 11px;
  padding: 2px 4px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #fff;
}
#totp-locked-text { color: #b26a00; }

/* Section */
.section { margin-bottom: 6px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 8px;
  cursor: pointer;
  user-select: none;
  border-radius: 5px;
  margin-bottom: 4px;
}

.section-overdue { border-left: 5px solid #b71c1c; background: #e8b0b0; color: #5c0e0e; }
.section-danger { border-left: 5px solid var(--color-danger); background: #f1cdcd; color: #8b2020; }
.section-warning { border-left: 5px solid var(--color-warning); background: #e2d4bf; color: #6b4f1a; }
.section-success { border-left: 5px solid var(--color-success); background: #cce6cf; color: #1e5e20; }
.section-other { border-left: 5px solid var(--color-other); background: #e0e0e0; color: #444; }
.section-checked { border-left: 5px solid #6582ff; background: #c6d1fc; color: #2a3d8f; }

.section-toggle {
  font-size: 9px;
  transition: transform 0.2s ease;
}

.section-toggle.collapsed { transform: rotate(-90deg); }

.section-count { font-weight: 400; opacity: 0.7; }

.section-items { display: block; }
.section-items.collapsed { display: none; }

/* Card */
.card {
  background: #fff;
  border: 2px solid #777;
  border-radius: 8px;
  padding: 6px 8px;
  margin-bottom: 4px;
  transition: box-shadow 0.15s;
}

.card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

.card.urgency-danger,
.card.urgency-overdue { border-color: var(--color-danger); }
.card.urgency-warning { border-color: var(--color-warning); }
.card.urgency-success { border-color: var(--color-success); }
.card.urgency-other { border-color: var(--color-other); }
.card.completed { border-color: #6582ff; opacity: 0.7; }

/* Badge row */
.badge-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  margin-bottom: 2px;
}

.course-pill {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.course-pill.urgency-danger,
.course-pill.urgency-overdue { background: var(--color-danger); }
.course-pill.urgency-warning { background: var(--color-warning); }
.course-pill.urgency-success { background: var(--color-success); }
.course-pill.urgency-other { background: var(--color-other); }

.badge-quiz {
  background: #f3e5f5;
  color: #7b1fa2;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 600;
}

.badge-resubmit {
  padding: 1px 6px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 600;
  background: #fff3e0;
  color: #e65100;
}

.badge-no-resubmit {
  padding: 1px 6px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 600;
  background: #fce4ec;
  color: #c62828;
}

/* Card name */
.card-name {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 2px;
  line-height: 1.3;
}

.card-name a {
  color: #1565c0;
  text-decoration: none;
  cursor: pointer;
}

.card-name a:hover { text-decoration: underline; }

/* Card meta */
.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #999;
}

.time-remain {
  font-weight: 700;
  font-size: 11px;
  color: #333;
}

.time-remain.overdue { color: #e85555; }

/* Empty state */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
  gap: 8px;
}

.empty-icon { font-size: 32px; }
.empty-text { font-size: 13px; color: #999; text-align: center; line-height: 1.5; }

/* Memo section */
.section-memo { border-left: 5px solid #26a69a; background: #c8ece8; color: #1a5c54; }

.badge-memo {
  background: #e0f2f1;
  color: #00695c;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 600;
}

.badge-repeat {
  background: #e8f5e9;
  color: #2e7d32;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 600;
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
  body { background: #1e1e1e; color: #e0e0e0; }
  .header { background: #2a2a2a; border-color: #444; }
  .logo { color: #7ba3d8; }
  .version-link { color: #888; }
  .version-link:hover { color: #7ba3d8; }
  .cache-info { color: #777; }
  .footer { background: #2a2a2a; border-color: #444; }
  .footer a { color: #7ba3d8; }
  .card { background: #2a2a2a; }
  .card-name a { color: #64b5f6; }
  .card-meta { color: #777; }
  .time-remain { color: #e0e0e0; }
  .refresh-btn { color: #aaa; }
  .refresh-btn:hover { background: rgba(255,255,255,0.1); }
  .toast { background: #555; }
  .empty-text { color: #777; }
  .section-overdue { background: #4a1a1a; color: #f0a0a0; }
  .section-danger { background: #4a2020; color: #f0a0a0; }
  .section-warning { background: #4a3a1a; color: #e0c080; }
  .section-success { background: #1a3a1a; color: #90d090; }
  .section-other { background: #3a3a3a; color: #bbb; }
  .section-checked { background: #2a2a5a; color: #a0b0f0; }
  .section-memo { background: #1a3a38; color: #80cbc4; }
  .badge-memo { background: #1a3a38; color: #80cbc4; }
  .badge-repeat { background: #1a3a1a; color: #81c784; }
  .totp-section { background: #2a2a2a; border-color: #444; }
  .totp-title { color: #aaa; }
  .totp-input { background: #333; border-color: #555; color: #e0e0e0; }
  .totp-desc { color: #777; }
  .totp-security-note { color: #666; border-color: #444; }
  .totp-btn-qr { background: #3a3a3a; color: #ccc; }
  .totp-btn-qr:hover { background: #444; }
  .totp-pp { border-color: #444; }
  .totp-pp-status { color: #888; }
  .totp-autolock-row { color: #999; }
  .totp-autolock-row select { background: #333; border-color: #555; color: #e0e0e0; }
  #totp-locked-text { color: #e0a44d; }
}
</style>
</head>
<body>
  <div class="header">
    <span class="logo">
      <span id="header-title">KULMS+</span>
      <a id="header-version" class="version-link" href="https://radian0523.github.io/kulms-extension/#changelog" target="_blank" rel="noopener noreferrer"></a>
    </span>
    <div class="header-right">
      <span id="cache-info" class="cache-info"></span>
      <button id="refresh-btn" class="refresh-btn" title="更新">&#x1F504;</button>
    </div>
  </div>
  <div id="content" class="content"></div>
  <div class="totp-section" id="totp-section">
    <div class="totp-header" id="totp-header">
      <span class="totp-title" id="totp-title">TOTP</span>
      <span class="totp-toggle" id="totp-toggle">&#x25BC;</span>
    </div>
    <div class="totp-body" id="totp-body">
      <div id="totp-configured" style="display:none">
        <div class="totp-status" id="totp-status-text"></div>
        <div class="totp-debug" id="totp-debug" style="display:none">
          <div class="totp-debug-code">
            <span id="totp-debug-otp"></span>
            <span class="totp-debug-countdown" id="totp-debug-countdown"></span>
          </div>
          <div class="totp-debug-secret" id="totp-debug-secret"></div>
        </div>
        <div id="totp-qr-display" class="totp-qr-display" style="display:none">
          <div id="totp-qr-canvas"></div>
        </div>
        <div class="totp-configured-actions">
          <button class="totp-btn totp-btn-show" id="totp-show-btn"></button>
          <button class="totp-btn totp-btn-qrgen" id="totp-qrgen-btn">QR</button>
          <button class="totp-btn totp-btn-delete" id="totp-delete-btn"></button>
        </div>
        <div class="totp-pp" id="totp-pp-area">
          <div class="totp-pp-status" id="totp-pp-status"></div>
          <div class="totp-configured-actions">
            <button class="totp-btn totp-btn-qrgen" id="totp-pp-protect-btn" style="display:none"></button>
            <button class="totp-btn totp-btn-qrgen" id="totp-pp-change-btn" style="display:none"></button>
            <button class="totp-btn totp-btn-qrgen" id="totp-lock-btn" style="display:none"></button>
            <button class="totp-btn totp-btn-delete" id="totp-pp-remove-btn" style="display:none"></button>
          </div>
          <div class="totp-input-row totp-pp-setrow" id="totp-pp-setrow" style="display:none">
            <input type="password" class="totp-input" id="totp-pp-input" autocomplete="new-password" spellcheck="false">
            <input type="password" class="totp-input" id="totp-pp-input2" autocomplete="new-password" spellcheck="false">
            <button class="totp-btn totp-btn-save" id="totp-pp-save-btn"></button>
            <button class="totp-btn totp-btn-qr" id="totp-pp-cancel-btn"></button>
          </div>
          <div class="totp-autolock-row" id="totp-autolock-row" style="display:none">
            <span id="totp-autolock-label"></span>
            <select id="totp-autolock-select">
              <option value="5">5</option>
              <option value="15">15</option>
              <option value="30">30</option>
              <option value="60">60</option>
              <option value="0" id="totp-autolock-never"></option>
            </select>
          </div>
        </div>
      </div>
      <div id="totp-locked" style="display:none">
        <div class="totp-status" id="totp-locked-text"></div>
        <div class="totp-input-row">
          <input type="password" class="totp-input" id="totp-unlock-input" autocomplete="current-password" spellcheck="false">
          <button class="totp-btn totp-btn-save" id="totp-unlock-btn"></button>
        </div>
        <button class="totp-btn totp-btn-delete" id="totp-locked-delete-btn"></button>
      </div>
      <div id="totp-unconfigured" style="display:none">
        <div class="totp-input-row">
          <input type="text" class="totp-input" id="totp-input" placeholder="Base32 secret key" spellcheck="false" autocomplete="off">
          <button class="totp-btn totp-btn-save" id="totp-save-btn" disabled></button>
        </div>
        <button class="totp-btn totp-btn-qr" id="totp-qr-btn">
          <svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V3H3v4zm4 4h2V9H7v2zm0-4h2V3H7v4zM3 15h2v-2H3v2zm8-4h2V9h-2v2zm-4 4h2v-2H7v2zm4 0h2v-2h-2v2zm0-8h2V3h-2v4zm6 8h2v-2h-2v2zm0-12v4h2V3h-2zm0 8h2V9h-2v2zm-4 4h2v-2h-2v2zm0-8h2V3h-2v4zm4 8h2v-2h-2v2zM3 19h2v-2H3v2zm4 0h2v-2H7v2zm4 0h2v-2h-2v2zm4 0h2v-2h-2v2zm4 0h2v-2h-2v2z"/></svg>
          <span id="totp-qr-btn-text"></span>
        </button>
        <div class="totp-desc" id="totp-desc-text"></div>
      </div>
      <div class="totp-security-note" id="totp-security-note"></div>
    </div>
  </div>
  <div class="footer">
    <a href="#" id="open-lms">LMS を開く</a>
  </div>
  <script src="vendor/qrcode-gen.js"></script>
  <script src="popup.js"></script>
</body>
</html>
