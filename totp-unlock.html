<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KULMS+ 生体認証</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #fafafa;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      text-align: center;
    }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 13px; line-height: 1.6; color: #666; margin: 0 0 18px; max-width: 340px; }
    button {
      font-size: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4169b0;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #3a5f95; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 16px; font-size: 13px; min-height: 20px; }
    .ok { color: #2e7d32; }
    .err { color: #c62828; }
    .icon { font-size: 40px; margin-bottom: 10px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1f1f1f; color: #e0e0e0; }
      p { color: #aaa; }
      button { background: #4169b0; }
    }
  </style>
</head>
<body>
  <div class="icon">🔐</div>
  <h1 id="title">KULMS+</h1>
  <p id="desc"></p>
  <button id="run-btn"></button>
  <button id="close-btn" style="display:none; background:#888; margin-top:10px;"></button>
  <div id="status"></div>
  <script src="totp-unlock.js"></script>
</body>
</html>
